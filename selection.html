<!doctype html>
<html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Votre sélection — GLR Immobilier</title>
<style>
  :root { --gold:#c8a96e; --dark:#1a1d23; --muted:#6b7280; --bg:#f7f5f1; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--dark); font-family:'Helvetica Neue',Arial,sans-serif; line-height:1.55; }
  .wrap { max-width:720px; margin:0 auto; padding:32px 18px 60px; }
  header { text-align:center; padding:26px 0 20px; }
  .marque { font-family:Georgia,serif; letter-spacing:4px; font-size:17px; font-weight:700; }
  .filet { width:54px; height:2px; background:var(--gold); margin:14px auto 0; }
  .intro { background:#fff; border:1px solid #e8e3d9; border-radius:14px; padding:22px 24px; margin:18px 0 26px; }
  .intro h1 { font-family:Georgia,serif; font-size:21px; margin-bottom:8px; }
  .intro p { color:#3f4550; font-size:15px; white-space:pre-line; }
  .intro .sig { margin-top:12px; color:var(--muted); font-size:13px; }
  .compteur { text-align:center; color:var(--muted); font-size:13px; letter-spacing:1px; text-transform:uppercase; margin-bottom:14px; }
  .card { background:#fff; border:1px solid #e8e3d9; border-radius:14px; overflow:hidden; margin-bottom:26px; box-shadow:0 2px 10px rgba(26,29,35,.05); }
  .img { height:220px; background-size:cover; background-position:center; }
  .img-empty { display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#1a1d23,#3a3f4a); color:var(--gold); font-family:Georgia,serif; letter-spacing:6px; font-size:22px; height:220px; }
  .body { padding:20px 22px 22px; }
  .eyebrow { color:var(--gold); font-size:12px; letter-spacing:1.5px; text-transform:uppercase; font-weight:600; margin-bottom:4px; }
  h2 { font-family:Georgia,serif; font-size:20px; margin-bottom:4px; }
  .prix { font-size:16px; font-weight:700; margin-bottom:8px; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .chip { border:1px solid #e0d9c8; border-radius:20px; padding:2px 10px; font-size:12px; color:#4a4f58; }
  .pitch { font-size:14px; color:#3f4550; margin-bottom:10px; }
  .atouts { margin:0 0 12px 18px; font-size:13.5px; color:#3f4550; }
  .atouts li { margin-bottom:2px; }
  .det { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px 14px; margin:12px 0; padding:12px 14px; background:#faf8f4; border:1px solid #eee8db; border-radius:10px; }
  .det span { display:block; font-size:10px; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); }
  .det strong { font-size:13.5px; }
  .docs { display:flex; gap:8px; flex-wrap:wrap; margin:4px 0 4px; }
  .doc { border:1px solid var(--gold); background:#fff; color:var(--dark); border-radius:9px; padding:8px 13px; font-size:13px; font-weight:600; text-decoration:none; }
  .doc:hover { background:var(--gold); color:#fff; }
  .ad { width:100%; margin-top:12px; border:1px solid var(--gold); background:#fff; color:var(--dark); border-radius:9px; padding:11px; font-size:14px; font-weight:600; cursor:pointer; transition:all .15s; }
  .ad:hover { background:var(--gold); color:#fff; }
  .ad.on { background:var(--gold); border-color:var(--gold); color:#fff; }
  .avis { border-top:1px dashed #e0d9c8; margin-top:16px; padding-top:14px; }
  .avis-titre { font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .avis-btns { display:flex; gap:8px; flex-wrap:wrap; }
  .ab { border:1px solid #ddd6c8; background:#faf8f4; border-radius:22px; padding:8px 14px; font-size:13.5px; cursor:pointer; transition:all .15s; }
  .ab:hover { border-color:var(--gold); }
  .ab.on { background:var(--gold); border-color:var(--gold); color:#fff; font-weight:600; }
  .avis-com { display:flex; gap:8px; margin-top:10px; }
  .avis-com input { flex:1; border:1px solid #ddd6c8; border-radius:9px; padding:8px 12px; font-size:13.5px; outline:none; background:#faf8f4; }
  .avis-com input:focus { border-color:var(--gold); }
  .ac { border:none; background:var(--dark); color:#fff; border-radius:9px; padding:8px 14px; font-size:13px; cursor:pointer; }
  footer { text-align:center; color:var(--muted); font-size:12.5px; margin-top:34px; }
  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--dark); color:#fff; border-radius:24px; padding:10px 22px; font-size:13.5px; transition:transform .25s; z-index:50; }
  #toast.show { transform:translateX(-50%) translateY(0); }
  .etat { text-align:center; color:var(--muted); padding:50px 0; }
  @media (max-width:480px){ .img{height:180px} .img-empty{height:180px} .body{padding:16px} }
</style></head><body>
<div class="wrap">
  <header><div class="marque">GLR IMMOBILIER</div><div class="filet"></div></header>
  <div id="contenu" class="etat">Chargement de votre sélection…</div>
</div>
<div id="toast">✓</div>
<script>
(function(){
  var SUPA = "https://hydqfbxdtpmbuooexekp.supabase.co";
  var KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5ZHFmYnhkdHBtYnVvb2V4ZWtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODA3NDEsImV4cCI6MjA5NDg1Njc0MX0.ylton95WooAxVbIqdgYIaiW8E6lGlxEuKsLEe-hzU0g";
  var token = new URLSearchParams(location.search).get("t") || "";
  var FN = SUPA + "/functions/v1/selection/" + encodeURIComponent(token);
  var cont = document.getElementById("contenu");

  function esc(s){
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function toast(m){
    var t = document.getElementById("toast");
    t.textContent = m; t.classList.add("show");
    setTimeout(function(){ t.classList.remove("show"); }, 2400);
  }
  function envoyer(i, payload, message){
    var corps = { action: "avis", index: i };
    for (var k in payload) corps[k] = payload[k];
    fetch(FN, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(corps) })
      .then(function(r){ if (!r.ok) throw 0; toast(message || "✓ Merci, votre avis a bien été transmis"); })
      .catch(function(){ toast("⚠ Envoi impossible, réessayez"); });
  }

  if (!token) { cont.textContent = "Ce lien de sélection n'existe pas ou a expiré."; return; }

  // Marque la sélection comme ouverte (suivi côté vendeur)
  fetch(FN, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ action: "ouvert" }) }).catch(function(){});

  fetch(SUPA + "/rest/v1/selections?select=*&token=eq." + encodeURIComponent(token), { headers: { apikey: KEY, Authorization: "Bearer " + KEY } })
  .then(function(r){ return r.json(); })
  .then(function(rows){
    var sel = rows && rows[0];
    if (!sel) { cont.textContent = "Ce lien de sélection n'existe pas ou a expiré."; return; }
    var biens = Array.isArray(sel.biens) ? sel.biens : [];
    var avis = sel.avis || {};
    var prenom = String(sel.client_nom || "").trim().split(" ")[0] || "";
    var h = "";
    h += "<div class='intro'><h1>Bonjour" + (prenom ? " " + esc(prenom) : "") + ",</h1>";
    h += "<p>" + esc(sel.message || "Voici une sélection de biens correspondant à vos critères.") + "</p>";
    if (sel.vendeur) h += "<div class='sig'>— " + esc(sel.vendeur) + ", GLR Immobilier</div>";
    h += "</div>";
    h += "<div class='compteur'>" + biens.length + " bien" + (biens.length > 1 ? "s" : "") + " sélectionné" + (biens.length > 1 ? "s" : "") + " pour vous</div>";
    biens.forEach(function(b, i){
      var a = avis[String(i)] || {};
      h += "<div class='card'>";
      h += b.image ? "<div class='img' style=\"background-image:url('" + esc(b.image) + "')\"></div>" : "<div class='img-empty'>GLR</div>";
      h += "<div class='body'>";
      if (b.ville) h += "<div class='eyebrow'>📍 " + esc(b.ville) + "</div>";
      h += "<h2>" + esc(b.titre) + "</h2>";
      if (b.prix) h += "<div class='prix'>" + esc(b.prix) + "</div>";
      var typos = Array.isArray(b.typologies) ? b.typologies : [];
      if (typos.length) h += "<div class='chips'>" + typos.map(function(t){ return "<span class='chip'>" + esc(t) + "</span>"; }).join("") + "</div>";
      if (b.pitch) h += "<p class='pitch'>" + esc(b.pitch) + "</p>";
      // Fiche du lot : caractéristiques
      var det = [];
      if (b.surface) det.push(["Surface", b.surface]);
      if (b.etage) det.push(["Étage", b.etage]);
      if (b.terrasse) det.push(["Terrasse / balcon", b.terrasse]);
      if (b.parking) det.push(["Parking", b.parking]);
      if (b.expo) det.push(["Exposition", b.expo]);
      if (b.livraison) det.push(["Livraison", b.livraison]);
      if (det.length) h += "<div class='det'>" + det.map(function(d){ return "<div><span>" + esc(d[0]) + "</span><strong>" + esc(d[1]) + "</strong></div>"; }).join("") + "</div>";
      var atouts = Array.isArray(b.atouts) ? b.atouts.slice(0, 4) : [];
      if (atouts.length) h += "<ul class='atouts'>" + atouts.map(function(x){ return "<li>" + esc(x) + "</li>"; }).join("") + "</ul>";
      // Documents : fiche complète, plan, plan de masse
      var docs = [];
      if (b.lien) docs.push(["📄 Fiche & plans du lot", b.lien]);
      if (b.pdf) docs.push(["📎 Fiche du lot (PDF)", b.pdf]);
      if (b.plan) docs.push(["📐 Plan de l'appartement", b.plan]);
      if (b.masse) docs.push(["🗺️ Plan de masse", b.masse]);
      if (docs.length) h += "<div class='docs'>" + docs.map(function(d){ return "<a class='doc' href='" + esc(d[1]) + "' target='_blank' rel='noopener'>" + d[0] + "</a>"; }).join("") + "</div>";
      h += "<div class='avis' data-i='" + i + "'>";
      h += "<div class='avis-titre'>Votre avis sur ce bien :</div>";
      h += "<div class='avis-btns'>";
      h += "<button class='ab" + (a.choix === "interesse" ? " on" : "") + "' data-c='interesse'>😍 Ça m'intéresse</button>";
      h += "<button class='ab" + (a.choix === "a_discuter" ? " on" : "") + "' data-c='a_discuter'>🤔 À discuter</button>";
      h += "<button class='ab" + (a.choix === "pas_pour_moi" ? " on" : "") + "' data-c='pas_pour_moi'>❌ Pas pour moi</button>";
      h += "</div>";
      h += "<div class='avis-com'><input type='text' maxlength='500' placeholder='Un commentaire ? (optionnel)'><button class='ac'>Envoyer</button></div>";
      h += "<button class='ad" + (a.infos ? " on" : "") + "'>" + (a.infos ? "✓ Demande envoyée — votre conseiller revient vers vous" : "ℹ️ Cet appartement m'intéresse, je veux plus d'infos") + "</button>";
      h += "</div></div></div>";
    });
    h += "<footer>Donnez votre avis sur chaque bien : votre conseiller adaptera la prochaine sélection.<br>GLR Immobilier</footer>";
    cont.className = "";
    cont.innerHTML = h;
    Array.prototype.forEach.call(document.querySelectorAll(".avis"), function(bloc){
      var i = parseInt(bloc.getAttribute("data-i"), 10);
      var a = avis[String(i)] || {};
      var input = bloc.querySelector(".avis-com input");
      if (a.commentaire) input.value = a.commentaire;
      Array.prototype.forEach.call(bloc.querySelectorAll(".ab"), function(btn){
        btn.addEventListener("click", function(){
          Array.prototype.forEach.call(bloc.querySelectorAll(".ab"), function(b2){ b2.classList.remove("on"); });
          btn.classList.add("on");
          envoyer(i, { choix: btn.getAttribute("data-c") });
        });
      });
      bloc.querySelector(".ac").addEventListener("click", function(){ if (input.value.trim()) envoyer(i, { commentaire: input.value.trim() }); });
      var btnInfos = bloc.querySelector(".ad");
      btnInfos.addEventListener("click", function(){
        btnInfos.classList.add("on");
        btnInfos.textContent = "✓ Demande envoyée — votre conseiller revient vers vous";
        envoyer(i, { infos: true }, "✓ Demande envoyée, votre conseiller revient vers vous rapidement");
      });
    });
  })
  .catch(function(){ cont.textContent = "Erreur de chargement — réessayez."; });
})();
</script>
</body></html>
